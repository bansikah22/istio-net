# Default values for prime-calculator.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

replicaCount: 1

image:
  repository: ghcr.io/bansikah22/istio-net/istio-test-app
  pullPolicy: Always
  # Overridden by the version specified in the Chart.yaml
  tag: "v1.0.0-stable"
  
  # Canary deployment settings
  canary:
    # Set to true to deploy a canary version alongside the stable version
    enabled: false
    # The image tag for the canary version
    tag: "v2.0.0-canary"
    # Number of replicas for the canary deployment
    replicaCount: 1
  
  imagePullSecrets:
    # The name of the secret to use for pulling private images
    - name: ghcr-credentials
  nameOverride: ""
  fullnameOverride: ""

serviceAccount:
  # Specifies whether a service account should be created
  create: true
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: ""

podAnnotations: {}

podSecurityContext: {}
  # fsGroup: 2000

securityContext: {}
  # capabilities:
  #   drop:
  #   - ALL
  # readOnlyRootFilesystem: true
  # runAsNonRoot: true
  # runAsUser: 1000

service:
  type: ClusterIP
  port: 3001

ingress:
  enabled: false
  className: ""
  annotations: {}
    # kubernetes.io/ingress.class: nginx
    # kubernetes.io/tls-acme: "true"
  hosts:
    - host: chart-example.local
      paths:
        - path: /
          pathType: ImplementationSpecific
  tls: []
  #  - secretName: chart-example-tls
  #    hosts:
  #      - chart-example.local

# Istio-specific configuration
istio:
  # Set to true to create Istio Gateway and VirtualService resources
  enabled: false
  # The host to expose the service on. Use "*" for any host in a local environment.
  host: "*"

resources: {}
  # We usually recommend not to specify default resources and to leave this as a conscious
  # choice for the user. This also increases chances charts run on environments with little
  # resources, such as Minikube. If you do want to specify resources, uncomment the following
  # lines, adjust them as necessary, and remove the curly braces after 'resources:'.
  # limits:
  #   cpu: 100m
  #   memory: 128Mi
  # requests:
  #   cpu: 100m
  #   memory: 128Mi

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 100
  targetCPUUtilizationPercentage: 80
  # targetMemoryUtilizationPercentage: 80

nodeSelector: {}

tolerations: []

affinity: {}
